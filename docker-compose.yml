services:
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://arka:password123@db:5432/tokodb
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=arka
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=tokodb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arka -d tokodb"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7
